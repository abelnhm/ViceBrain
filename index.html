<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ViceBrain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Dark Mode (default) - Vice City neon style */
:root {
  --bg:    #121212;
  --surf:  #1E1E1E;
  --surf2: #252525;
  --bord:  #333333;
  --bord2: #404040;
  --txt:   #FFFFFF;
  --dim:   #666666;
  --mid:   #888888;
  --accent-purple: #5B2C6F;
  --accent-pink: #FF1493;
  --accent-cyan: #00FFFF;
  --accent-yellow: #FFD700;
  --r: 8px;
  --mode: 'dark';
}
[data-theme="light"] {
  --bg:    #FFFFFF;
  --surf:  #F5F5F5;
  --surf2: #E8E8E8;
  --bord:  #E0E0E0;
  --bord2: #CCCCCC;
  --txt:   #212121;
  --dim:   #999999;
  --mid:   #666666;
  --accent-purple: #5B2C6F;
  --accent-pink: #FF69B4;
  --accent-cyan: #00CED1;
  --accent-yellow: #FFC107;
  --mode: 'light';
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--txt); font-family: 'Syne', sans-serif; transition: background .3s, color .3s; }

/* ══════════════════════════════════════════════════════════════
   TITLEBAR
══════════════════════════════════════════════════════════════ */
#titlebar {
  height: 42px; display: flex; align-items: center; gap: 8px;
  padding: 0 14px; background: var(--surf); border-bottom: 1px solid var(--bord);
  -webkit-app-region: drag; flex-shrink: 0; user-select: none;
}
.logo {
  width: 22px; height: 22px; border-radius: 5px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink), var(--accent-cyan));
  animation: spin 10s linear infinite; -webkit-app-region: no-drag;
}
@keyframes spin { to { transform: rotate(360deg); } }
.title-txt { font-size: .72rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--accent-cyan); margin-left: 4px; }
.title-txt span { color: var(--accent-pink); font-weight: 400; }

/* separator */
.sep { width: 1px; height: 18px; background: var(--bord2); flex-shrink: 0; }

.tb-right { margin-left: auto; display: flex; align-items: center; gap: 6px; -webkit-app-region: no-drag; }

/* shared toolbar button style */
.tb-btn {
  background: transparent; border: 1px solid var(--bord2); border-radius: 5px;
  color: var(--mid); cursor: pointer; font-family: 'Space Mono', monospace;
  font-size: .58rem; padding: 6px 10px; letter-spacing: .06em;
  transition: all .18s; display: flex; align-items: center; gap: 4px;
  white-space: nowrap; flex-shrink: 0; height: 32px; box-sizing: border-box;
}
.tb-btn:hover { border-color: var(--accent-cyan); color: var(--txt); }
.tb-btn.on    { background: var(--accent-purple); border-color: var(--accent-purple); color: #fff; }
#langToggle, #themeToggle, #toggleSidebar { padding: 6px 10px; }
#langToggle span, #themeToggle span, #toggleSidebar span { font-size: 1rem; }
#sidebarIcon { margin-right: 4px; }

/* layout mode group */
.mode-group { display: flex; border: 1px solid var(--bord2); border-radius: 5px; overflow: hidden; }
.mode-btn {
  background: transparent; border: none; border-right: 1px solid var(--bord2);
  color: var(--dim); cursor: pointer; font-family: 'Space Mono', monospace;
  font-size: .58rem; padding: 3px 10px; letter-spacing: .06em; transition: all .18s;
  display: flex; align-items: center; gap: 4px;
}
.mode-btn:last-child { border-right: none; }
.mode-btn:hover { color: var(--txt); background: var(--surf2); }
.mode-btn.active { background: var(--accent-purple); color: #fff; }

/* grid cols control */
.grid-ctrl { display: flex; align-items: center; gap: 4px; -webkit-app-region: no-drag; }
.grid-ctrl label { font-family: 'Space Mono', monospace; font-size: .55rem; color: var(--dim); }
.grid-ctrl .gcbtn {
  width: 20px; height: 20px; background: var(--surf2); border: 1px solid var(--bord2);
  border-radius: 4px; color: var(--mid); cursor: pointer; font-size: .8rem; line-height: 1;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.grid-ctrl .gcbtn:hover { color: var(--txt); border-color: var(--mid); }
.grid-ctrl .gcval {
  font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--txt);
  min-width: 14px; text-align: center;
}

/* sidebar toggle arrow */
#toggleSidebar .arr { display: inline-block; transition: transform .25s ease; }
#toggleSidebar.on .arr { transform: rotate(180deg); }

/* active dots */
.active-dots { display: flex; gap: 4px; align-items: center; }
.adot { width: 6px; height: 6px; border-radius: 50%; animation: dp 2.5s ease-in-out infinite; }
@keyframes dp { 0%,100%{opacity:.3} 50%{opacity:1} }

/* ══════════════════════════════════════════════════════════════
   BODY
══════════════════════════════════════════════════════════════ */
#body { display: flex; height: calc(100vh - 42px); }

/* ══════════════════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════════════════ */
#sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--surf); border-right: 1px solid var(--bord);
  display: flex; flex-direction: column;
  transition: width .28s cubic-bezier(.4,0,.2,1), opacity .22s ease, border-color .28s ease;
  overflow: hidden;
}
#sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; border-right-color: transparent; }
.sb-head {
  padding: 11px 14px 8px; font-family: 'Space Mono', monospace;
  font-size: .58rem; color: var(--dim); letter-spacing: .1em; text-transform: uppercase;
  border-bottom: 1px solid var(--bord); flex-shrink: 0;
  display: flex; justify-content: space-between; align-items: center;
  height: 42px;
}
.sb-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
.sb-list::-webkit-scrollbar { width: 3px; }
.sb-list::-webkit-scrollbar-thumb { background: var(--bord2); border-radius: 3px; }
.svc-row {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px; border-radius: 6px; cursor: pointer;
  transition: background .15s; user-select: none; margin-bottom: 2px;
}
.svc-row:hover { background: var(--surf2); }
.svc-row .svc-fav { 
  font-size: .65rem; cursor: pointer; color: var(--mid); transition: color .2s;
  margin-right: 2px; flex-shrink: 0;
}
.svc-row .svc-fav:hover, .svc-row .svc-fav.active { color: #fbbf24; }
.svc-dot  { width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0; }
.svc-icon { width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0; object-fit: contain; background: #fff; padding: 1px; }
.svc-name { font-size: .78rem; font-weight: 600; flex: 1; display: flex; align-items: center; gap: 5px; }
.svc-delete {
  font-size: .65rem; cursor: pointer; color: var(--mid); flex-shrink: 0;
  padding: 2px 4px; border-radius: 3px;
}
.svc-delete:hover { background: #7f1d1d; color: var(--accent-pink); }
.svc-badge {
  font-size: .6rem; padding: 2px 6px; border-radius: 3px; font-weight: 600;
  background: var(--accent-purple); color: var(--accent-cyan); flex-shrink: 0;
}
.svc-badge.limited { background: var(--accent-yellow); color: #000; }
.svc-badge.pending { background: var(--accent-purple); color: var(--accent-cyan); }
.svc-toggle {
  width: 28px; height: 16px; border-radius: 8px; background: var(--bord2);
  position: relative; flex-shrink: 0; transition: background .2s;
}
.svc-toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%; background: var(--dim);
  transition: transform .2s, background .2s;
}
.svc-row.on .svc-toggle { background: var(--accent-purple); }
.svc-row.on .svc-toggle::after { transform: translateX(12px); background: var(--accent-cyan); }
.sb-login-note {
  padding: 10px 12px; margin: 0 8px 8px; background: var(--accent-yellow);
  border-radius: 5px; font-size: .75rem; color: #000;
  line-height: 1.4; border: 1px solid var(--accent-yellow);
}
.sb-footer { padding: 9px 12px; border-top: 1px solid var(--bord); flex-shrink: 0; display: flex; flex-direction: column; gap: 5px; }
.sb-footer button {
  width: 100%; padding: 6px; background: var(--surf2); border: 1px solid var(--bord2);
  border-radius: 5px; color: var(--mid); font-family: 'Space Mono', monospace;
  font-size: .58rem; cursor: pointer; transition: all .18s; letter-spacing: .05em;
}
.sb-footer button:hover { border-color: var(--accent-cyan); color: var(--txt); }

/* ══════════════════════════════════════════════════════════════
   MAIN AREA
══════════════════════════════════════════════════════════════ */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

/* ══════════════════════════════════════════════════════════════
   VIEWPORT — wraps the scrollable grid
══════════════════════════════════════════════════════════════ */
#viewport { flex: 1; min-height: 0; overflow: auto; padding: 8px 8px 0; }
#viewport::-webkit-scrollbar { width: 6px; height: 6px; }
#viewport::-webkit-scrollbar-track { background: transparent; }
#viewport::-webkit-scrollbar-thumb { background: var(--bord2); border-radius: 3px; }

/* ══════════════════════════════════════════════════════════════
   GRID — layout controlled by JS
══════════════════════════════════════════════════════════════ */
#grid { display: flex; gap: 8px; height: 100%; }

/* Column mode: horizontal row, each col has explicit width */
#grid.mode-cols { flex-direction: row; align-items: stretch; }
#grid.mode-cols .col { flex-shrink: 0; flex-grow: 1; }

/* Grid (tile) mode: wrapping grid */
#grid.mode-grid {
  flex-wrap: wrap;
  align-content: flex-start;
  height: auto; /* allow wrapping */
}
#grid.mode-grid .col { 
  flex: 1 1 calc((100% - var(--gap) * (var(--gcols) - 1)) / var(--gcols)); 
  max-width: calc((100% - var(--gap) * (var(--gcols) - 1)) / var(--gcols)); 
  min-height: 400px;
  height: auto;
}

/* ══════════════════════════════════════════════════════════════
   COLUMN CARD
══════════════════════════════════════════════════════════════ */
.col {
  display: flex; flex-direction: column;
  border: 1px solid var(--bord); border-radius: var(--r);
  overflow: hidden; background: var(--surf);
  animation: rise .32s ease both;
  position: relative;
  min-width: 200px;
}
@keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.col.flash { animation: flashborder .6s ease; }
@keyframes flashborder {
  0%,100% { box-shadow: none; }
  40%     { box-shadow: 0 0 24px var(--accent,#fff3), inset 0 0 10px var(--accent,#fff1); }
}

/* ── CHROME BAR ── */
.chrome {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 8px; background: var(--surf2);
  border-bottom: 1px solid var(--bord); flex-shrink: 0;
}
.tls { display: flex; gap: 4px; }
.tl  { width: 9px; height: 9px; border-radius: 50%; }
.tl-r{background:#ff5f57}.tl-y{background:#febc2e}.tl-g{background:#28c840}

.url-bar {
  flex: 1; display: flex; align-items: center; gap: 4px;
  background: #060a0f; border: 1px solid var(--bord2); border-radius: 3px;
  padding: 3px 7px; font-family: 'Space Mono', monospace; font-size: .52rem;
  color: var(--mid); overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
}
.lock { opacity: .45; flex-shrink: 0; }

/* width control buttons — only visible in column mode */
.w-ctrl { display: flex; gap: 2px; flex-shrink: 0; }
.w-btn {
  width: 19px; height: 19px; border-radius: 3px; border: 1px solid var(--bord2);
  background: transparent; color: var(--dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; line-height: 1; transition: all .15s; flex-shrink: 0;
  font-family: 'Space Mono', monospace;
}
.w-btn:hover { color: var(--txt); background: var(--bord2); }
.w-btn:active { transform: scale(.9); }
/* hide width controls in grid mode */
.mode-grid .w-ctrl { display: none; }

.reload-btn {
  width: 19px; height: 19px; border-radius: 3px; border: 1px solid var(--bord2);
  background: transparent; color: var(--dim); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: .75rem; transition: all .15s; flex-shrink: 0;
}
.reload-btn:hover { color: var(--txt); background: var(--bord2); }

.ai-tag {
  font-family: 'Space Mono', monospace; font-size: .5rem; font-weight: 700;
  padding: 2px 5px; border-radius: 3px; flex-shrink: 0;
}

/* ── DRAG RESIZE HANDLE (column mode only) ── */
.resize-handle {
  position: absolute; right: -5px; top: 0; bottom: 0;
  width: 10px; cursor: col-resize; z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.resize-handle::after {
  content: ''; width: 3px; height: 40px; border-radius: 2px;
  background: var(--bord2); transition: background .15s, height .15s;
}
.resize-handle:hover::after,
.resize-handle.dragging::after { background: var(--mid); height: 60px; }
/* hide in grid mode */
.mode-grid .resize-handle { display: none; }

/* ── LOADBAR ── */
.loadbar { height: 2px; width: 100%; flex-shrink: 0; }
.loadbar.loading { animation: lanim 1.4s ease-in-out infinite; }
@keyframes lanim { 0%{opacity:0;width:0%} 20%{opacity:1} 80%{width:90%} 100%{opacity:0;width:100%} }

/* ── WEBVIEW ── */
.col webview { flex: 1; min-height: 0; display: flex; }

/* ── STATUS STRIP ── */
.statusbar {
  height: 18px; display: flex; align-items: center; padding: 0 8px;
  border-top: 1px solid var(--bord); gap: 6px; flex-shrink: 0;
}
.stsdot { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); }
.stsdot.ready   { background: #28c840; }
.stsdot.loading { background: #febc2e; animation: dp 1s infinite; }
.stsdot.error   { background: #ff5f57; }
.stslabel { flex:1; font-family: 'Space Mono', monospace; font-size: .48rem; color: var(--dim);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── GOOGLE AUTH HINT ── */
.google-hint {
  display: none; position: absolute; bottom: 20px; left: 0; right: 0;
  background: #0c1e30; border-top: 1px solid #2a4060;
  padding: 7px 10px; font-family: 'Space Mono', monospace; font-size: .58rem;
  color: #7aafd4; gap: 8px; align-items: center; z-index: 10;
}
.google-hint.show { display: flex; }
.google-hint button {
  margin-left: auto; padding: 3px 8px; background: #1a3a55; border: 1px solid #2a5070;
  border-radius: 4px; color: #7aafd4; font-family: 'Space Mono', monospace;
  font-size: .56rem; cursor: pointer; white-space: nowrap;
}

/* ══════════════════════════════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════════════════════════════ */
#empty {
  display: none; flex: 1; align-items: center; justify-content: center;
  flex-direction: column; gap: 10px; color: var(--dim);
}
#empty.show { display: flex; }
#empty p { font-family: 'Space Mono', monospace; font-size: .72rem; }

/* ══════════════════════════════════════════════════════════════
   BOTTOM PANEL
══════════════════════════════════════════════════════════════ */
#bottom {
  display: flex; gap: 10px; align-items: stretch;
  padding: 8px 8px 10px; background: var(--surf);
  border-top: 1px solid var(--bord); flex-shrink: 0;
}
.prompt-wrap { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.row-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.meta-lbl { font-family: 'Space Mono', monospace; font-size: .53rem; color: var(--dim);
  letter-spacing: .1em; text-transform: uppercase; }
.autosend-wrap { margin-left: auto; display: flex; align-items: center; gap: 5px;
  font-family: 'Space Mono', monospace; font-size: .56rem; color: var(--mid); cursor: pointer; }
.autosend-wrap input { accent-color: var(--accent-cyan); cursor: pointer; }
textarea {
  width: 100%; background: var(--surf2); border: 1px solid var(--bord2); border-radius: 5px;
  color: var(--txt); font-family: 'Syne', sans-serif; font-size: 1rem; line-height: 1.6;
  padding: 10px 13px; resize: none; min-height: 70px; max-height: 160px; outline: none;
  transition: border-color .2s; -webkit-user-select: text; user-select: text;
}
textarea::placeholder { color: var(--dim); }
textarea:focus { border-color: var(--accent-cyan); }
#sendBtn {
  flex-shrink: 0; width: 90px;
  background: var(--accent-purple);
  border: 1px solid var(--accent-purple); border-radius: 5px;
  color: #fff; font-family: 'Space Mono', monospace;
  font-size: .62rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  transition: all .18s;
  height: 100%;
}
#sendBtn:hover:not(:disabled) { border-color:var(--accent-cyan); transform:translateY(-1px); }
#sendBtn:active:not(:disabled) { transform:translateY(0); }
#sendBtn:disabled { opacity:.4; cursor:not-allowed; }
.btn-dots { display:flex; gap:3px; flex-wrap:wrap; justify-content:center; max-width:54px; }
.btn-dot  { width:5px; height:5px; border-radius:50%; }

/* ══════════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════════ */
#toast {
  position: fixed; bottom: 82px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #0c1a28; border: 1px solid #253a55; border-radius: 5px;
  padding: 7px 15px; font-family: 'Space Mono', monospace; font-size: .6rem;
  color: #7aafd4; box-shadow: 0 6px 24px #00000050; opacity: 0;
  transition: opacity .22s, transform .22s; z-index: 9999;
  white-space: nowrap; pointer-events: none;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ══ TITLEBAR ══════════════════════════════════════════════════════════ -->
<div id="titlebar">
  <div class="logo"></div>
  <div class="title-txt">ViceBrain</div>
  <div class="sep"></div>

  <!-- Layout mode toggle -->
  <div class="mode-group" title="Modo de visualización">
    <button class="mode-btn active" id="btnCols" onclick="setLayout('cols')">
      ▐▐▐ <span id="lblCols">Columnas</span>
    </button>
    <button class="mode-btn" id="btnGrid" onclick="setLayout('grid')">
      ⊞ <span id="lblGrid">Cuadrícula</span>
    </button>
  </div>

  <!-- Grid columns control (only visible in grid mode) -->
  <div class="grid-ctrl" id="gridCtrl" style="display:none">
    <label>cols:</label>
    <button class="gcbtn" onclick="changeGridCols(-1)">−</button>
    <span class="gcval" id="gcVal">3</span>
    <button class="gcbtn" onclick="changeGridCols(+1)">+</button>
  </div>

  <div class="sep"></div>
  <div class="active-dots" id="activeDots"></div>

  <div class="tb-right">
    <button class="tb-btn" id="langToggle" onclick="toggleLanguage()" title="Cambiar idioma">
      <span id="currentLangFlag">🇪🇸</span>
    </button>
    <button class="tb-btn" id="themeToggle" onclick="toggleTheme()" title="Cambiar tema">
      <span id="themeIcon">🌙</span>
    </button>
    <button class="tb-btn on" id="toggleSidebar" onclick="toggleSidebar()">
      <span id="sidebarIcon">☰</span> <span id="lblServiciosBtn">Servicios</span>
    </button>
  </div>
</div>

<!-- ══ BODY ══════════════════════════════════════════════════════════════ -->
<div id="body">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sb-head">
      <span id="lblServicios">// Servicios activos</span>
    </div>
    <div class="sb-list" id="sbList"></div>
    <div class="sb-login-note" id="loginNote">
      ⚠ Login solo con email/contraseña.<br>Google, Microsoft y Apple no funcionan.
    </div>
    <div class="sb-footer">
      <button id="btnToggleIcons" onclick="toggleIconMode()">Iconos</button>
      <button onclick="toggleAll(true)" id="btnActivarTodos">Activar todos</button>
      <button onclick="toggleAll(false)" id="btnDesactivarTodos">Desactivar todos</button>
      <button onclick="showAddServiceDialog()" id="btnAddService">+ Añadir servicio</button>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="viewport">
      <div id="grid" class="mode-cols"></div>
      <div id="empty"><p>Sin servicios activos.</p><p style="font-size:.62rem;margin-top:4px">Actívalos desde el panel lateral.</p></div>
    </div>

    <!-- BOTTOM PANEL -->
    <div id="bottom">
      <div class="prompt-wrap">
        <div class="row-meta">
          <div class="meta-lbl" id="metaLbl">// Broadcast</div>
          <label class="autosend-wrap">
            <input type="checkbox" id="autoSend" checked> <span id="autoSendLabel">Auto-enviar</span>
          </label>
        </div>
        <textarea id="prompt" placeholder="Escribe tu prompt… se inyectará en todos los modelos activos. (Ctrl+Enter)" rows="3"></textarea>
      </div>
      <button id="sendBtn" onclick="broadcastPrompt()">
        <span id="sendTxt">ENVIAR</span>
        <div class="btn-dots" id="btnDots"></div>
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Add Service Dialog -->
<div id="addServiceDialog" class="dialog-overlay" style="display:none;">
  <div class="dialog">
    <div class="dialog-title" id="dialogTitle">Añadir servicio</div>
    <div class="dialog-field">
      <label id="dialogNameLabel">Nombre:</label>
      <input type="text" id="newSvcName" placeholder="Mi servicio">
    </div>

  } catch (e) { console.error(e); }
}

}

}

}

/* ══ Layout mode ════════════════════════════════════════════════════════ */
function setLayout(mode) {
  layoutMode = mode;
  document.getElementById('btnCols').classList.toggle('active', mode === 'cols');
  document.getElementById('btnGrid').classList.toggle('active', mode === 'grid');
  document.getElementById('gridCtrl').style.display = mode === 'grid' ? 'flex' : 'none';

  const grid = document.getElementById('grid');
  grid.classList.toggle('mode-cols', mode === 'cols');
  grid.classList.toggle('mode-grid', mode === 'grid');

  // viewport overflow: cols → scroll X, grid → scroll Y
  const vp = document.getElementById('viewport');
  vp.style.overflowX = mode === 'cols' ? 'auto'   : 'hidden';
  vp.style.overflowY = mode === 'cols' ? 'hidden'  : 'auto';

  applyLayout();
}

function changeGridCols(delta) {
  gridCols = Math.min(8, Math.max(1, gridCols + delta));
  document.getElementById('gcVal').textContent = gridCols;
  applyLayout();
}

function applyLayout() {
  const grid = document.getElementById('grid');
  if (layoutMode === 'cols') {
    // Each col has individual pixel width; grid height = 100%
    grid.style.height = '100%';
    grid.style.setProperty('--gap', '0px');
    grid.style.setProperty('--gcols', '1');
    // Apply individual widths but allow flex growth
    SERVICES.filter(s => enabled[s.id]).forEach(s => {
      const col = grid.querySelector(`.col[data-id="${s.id}"]`);
      if (col) {
        col.style.width = colWidths[s.id] + 'px';
        col.style.flexGrow = '1';
      }
    });
  } else {
    // Grid mode: equal columns
    grid.style.height = 'auto';
    grid.style.setProperty('--gap', '8px');
    grid.style.setProperty('--gcols', String(gridCols));
    // Remove explicit widths
    grid.querySelectorAll('.col').forEach(col => {
      col.style.width = '';
      col.style.flexGrow = '1';
    });
  }
}

/* ══ Column width controls ══════════════════════════════════════════════ */
function changeWidth(id, delta) {
  colWidths[id] = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, colWidths[id] + delta));
  const col = document.querySelector(`.col[data-id="${id}"]`);
  if (col && layoutMode === 'cols') col.style.width = colWidths[id] + 'px';
}

/* ══ Drag-resize handle ═════════════════════════════════════════════════ */
function initResizeHandle(handle, id) {
  let startX, startW;

  handle.addEventListener('mousedown', e => {
    if (layoutMode !== 'cols') return;
    e.preventDefault();
    startX = e.clientX;
    startW = colWidths[id];
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const onMove = e => {
      const dx  = e.clientX - startX;
      const nw  = Math.min(MAX_WIDTH, Math.max(MIN_WIDTH, startW + dx));
      colWidths[id] = nw;
      const col = document.querySelector(`.col[data-id="${id}"]`);
      if (col) col.style.width = nw + 'px';
    };
    const onUp = () => {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

/* ══ Rebuild grid ═══════════════════════════════════════════════════════ */
function rebuildGrid() {
  const ordered = getOrderedServices();
  const active = ordered.filter(s => enabled[s.id]);
  const grid   = document.getElementById('grid');
  const empty  = document.getElementById('empty');

  // Header dots
  document.getElementById('activeDots').innerHTML = active.map((s,i) =>
    `<div class="adot" style="background:${s.color};animation-delay:${i*.12}s"></div>`
  ).join('');

  // Send button dots
  const dotsHtml = active.map(s => {
    if (useIcons) {
      return `<img class="btn-dot" src="${getFaviconUrl(s.url)}" style="width:8px;height:8px;border-radius:2px;object-fit:contain;background:#fff" onerror="this.style.display='none'" />`;
    }
    return `<div class="btn-dot" style="background:${s.color}"></div>`;
  }).join('');
  document.getElementById('btnDots').innerHTML = dotsHtml;

  if (!active.length) {
    grid.style.display = 'none'; empty.classList.add('show'); return;
  }
  grid.style.display = 'flex'; empty.classList.remove('show');

  // Remove disabled cols
  [...grid.querySelectorAll('.col')].forEach(col => {
    if (!enabled[col.dataset.id]) col.remove();
  });

  // Add missing cols
  active.forEach(s => {
    if (!grid.querySelector(`.col[data-id="${s.id}"]`))
      grid.appendChild(makeColumn(s));
  });

  // Re-order
  active.forEach(s => {
    const el = grid.querySelector(`.col[data-id="${s.id}"]`);
    if (el) grid.appendChild(el);
  });

  applyLayout();
}

/* ══ Build a single column ══════════════════════════════════════════════ */
function makeColumn(s) {
  const col = document.createElement('div');
  col.className = 'col';
  col.dataset.id = s.id;
  col.style.setProperty('--accent', s.color + '55');
  col.style.width = colWidths[s.id] + 'px';

  col.innerHTML = `
    <div class="chrome">
      <div class="tls">
        <div class="tl tl-r"></div><div class="tl tl-y"></div><div class="tl tl-g"></div>
      </div>
      <div class="url-bar">
        <svg class="lock" width="8" height="9" viewBox="0 0 8 9" fill="none">
          <rect x="1" y="4" width="6" height="4.5" rx="1" fill="currentColor"/>
          <path d="M2 4V2.8A2 2 0 0 1 6 2.8V4" stroke="currentColor" stroke-width="1" fill="none"/>
        </svg>
        ${(function(){try{return new URL(s.url).hostname;}catch(e){return s.url;}})()}
      </div>
      <div class="w-ctrl">
        <button class="w-btn" title="Reducir ancho" onclick="changeWidth('${s.id}', -${WIDTH_STEP})">−</button>
        <button class="w-btn" title="Aumentar ancho" onclick="changeWidth('${s.id}', +${WIDTH_STEP})">+</button>
      </div>
      <button class="reload-btn" title="Recargar" onclick="reloadCol('${s.id}')">↺</button>
      <div class="ai-tag" style="background:${s.color}18;color:${s.color};border:1px solid ${s.color}30">
        ${s.name.toUpperCase()}
      </div>
    </div>
    <div class="loadbar" id="lb-${s.id}" style="background:${s.color}"></div>
    <webview
      id="wv-${s.id}"
      src="${s.url}"
      partition="${s.partition}"
      allowpopups
      useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
    ></webview>
    <div class="google-hint" id="gh-${s.id}">
      <span>🔑 Completa el login en tu navegador → luego recarga</span>
      <button onclick="reloadCol('${s.id}')">↺ Recargar</button>
    </div>
    <div class="statusbar">
      <div class="stsdot loading" id="sd-${s.id}"></div>
      <div class="stslabel" id="sl-${s.id}">Cargando…</div>
    </div>
    <div class="resize-handle" id="rh-${s.id}"></div>`;

  requestAnimationFrame(() => {
    const wv = document.getElementById('wv-' + s.id);
    if (!wv) return;
    wv.addEventListener('did-start-loading', () => {
      document.getElementById('lb-' + s.id)?.classList.add('loading');
      setStatus(s.id, 'loading', 'Cargando…');
    });
    wv.addEventListener('did-stop-loading', () => {
      document.getElementById('lb-' + s.id)?.classList.remove('loading');
      setStatus(s.id, 'ready', wv.getURL() || 'Listo');
    });
    wv.addEventListener('did-fail-load', e => {
      if (e.errorCode === -3) return;
      document.getElementById('lb-' + s.id)?.classList.remove('loading');
      setStatus(s.id, 'error', 'Error: ' + e.errorDescription);
    });
    wv.addEventListener('page-title-updated', e => setStatus(s.id, 'ready', e.title || wv.getURL()));

    // Wire resize handle
    const rh = document.getElementById('rh-' + s.id);
    if (rh) initResizeHandle(rh, s.id);
  });

  return col;
}

function setStatus(id, cls, txt) {
  const sd = document.getElementById('sd-' + id);
  const sl = document.getElementById('sl-' + id);
  if (sd) sd.className = 'stsdot ' + cls;
  if (sl) sl.textContent = txt;
}

function reloadCol(id) {
  document.getElementById('wv-' + id)?.reload();
  document.getElementById('gh-' + id)?.classList.remove('show');
}

/* ══ IPC ════════════════════════════════════════════════════════════════ */
ipcRenderer.on('google-auth-opened', (_, partition) => {
  const s = SERVICES.find(x => x.partition === partition);
  if (s) document.getElementById('gh-' + s.id)?.classList.add('show');
  showToast('🔑 Login de Google abierto en el navegador — recarga cuando termines');
});

ipcRenderer.on('auth-popup-closed', (_, partition) => {
  const s = SERVICES.find(x => x.partition === partition);
  if (s) setTimeout(() => reloadCol(s.id), 600);
});

/* ══ Broadcast ══════════════════════════════════════════════════════════ */
async function broadcastPrompt() {
  const prompt   = document.getElementById('prompt').value.trim();
  const autoSend = document.getElementById('autoSend').checked;
  if (!prompt) { showToast(t('promptVacio')); return; }

  const active = SERVICES.filter(s => enabled[s.id]);
  if (!active.length) { showToast(t('noHayServicios')); return; }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  document.getElementById('sendTxt').textContent = '…';

  let ok = 0, fail = 0;
  await Promise.all(active.map(async s => {
    const wv = document.getElementById('wv-' + s.id);
    if (!wv) { fail++; return; }
    try {
      const res = await ipcRenderer.invoke('inject-prompt', { viewId: wv.getWebContentsId(), prompt, autoSend });
      if (res?.ok) {
        ok++;
        const col = document.querySelector(`.col[data-id="${s.id}"]`);
        if (col) { col.classList.remove('flash'); void col.offsetWidth; col.classList.add('flash'); }
      } else fail++;
    } catch { fail++; }
  }));

  const modelWord = ok !== 1 ? t('modelosPlural') : t('modelos');
  showToast(fail === 0
    ? `${t('promptEnviado')} ${ok} ${modelWord}`
    : `${t('promptEnviado')} ${ok} ${t('ok')}  ✗ ${fail} ${t('fallaron')}`, 4000);
  btn.disabled = false;
  document.getElementById('sendTxt').textContent = t('send');
}

document.getElementById('prompt').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); broadcastPrompt(); }
});
const ta = document.getElementById('prompt');
ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 160) + 'px'; });

/* ══ Toast ══════════════════════════════════════════════════════════════ */
let _tt;
function showToast(msg, dur = 3500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => t.classList.remove('show'), dur);
}

/* ══ Init ═══════════════════════════════════════════════════════════════ */
document.getElementById('newSvcName').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('newSvcUrl').focus(); }
});
document.getElementById('newSvcUrl').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); confirmAddService(); }
});

loadTheme();
buildSidebar();
rebuildGrid();
setLayout('cols'); // default: columns mode
document.getElementById('btnToggleIcons').textContent = (useIcons ? '◐' : '◑') + ' Iconos';
updateLanguageUI();
updateAllTranslations();
</script>
